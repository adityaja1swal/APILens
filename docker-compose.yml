version: '3.8'

services:
  backend:
    build: ./backend
    container_name: apilens-backend
    ports:
      - "5000:5000"
    env_file: ./backend/.env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/apilens
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: apilens-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: apilens-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: apilens-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  mongo_data:
